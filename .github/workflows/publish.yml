name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Mandatory for Trusted Publishing (OIDC)
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Verify Version Consistency
        run: |
          PYTHON_VERSION=$(uv run python -c 'import sutra; print(f"v{sutra.__version__}")')
          TAG_VERSION=${{ github.ref_name }}
          if [ "$PYTHON_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version in sutra/__init__.py ($PYTHON_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-binaries:
    name: Build Standalone Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install PyInstaller and Sutra
        run: |
          uv venv
          uv pip install pyinstaller .

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller --onefile --name sutra sutra/__main__.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sutra-${{ matrix.os }}
          path: dist/sutra*

  create-release:
    name: Create GitHub Release
    needs: [publish, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sutra-ubuntu-latest/sutra
            artifacts/sutra-macos-latest/sutra
            artifacts/sutra-windows-latest/sutra.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
