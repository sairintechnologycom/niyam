name: Sutra CI/CD Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sutra-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for git diff target branch checks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Sutra CI Verification
        run: |
          sutra ci verify --target main --strict
