<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niyam Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.5rem; transition: all 0.2s; }
        .card:hover { border-color: #38bdf8; transform: translateY(-2px); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .status-completed { background-color: #065f46; color: #34d399; }
        .status-running { background-color: #854d0e; color: #fbbf24; }
        .status-failed { background-color: #7f1d1d; color: #f87171; }
        .status-planned { background-color: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">NIYAM</h1>
                <p class="text-slate-400 mt-2">AI Development Orchestration Control Plane</p>
            </div>
            <div id="connection-status" class="text-sm flex items-center">
                <span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span> Connected
            </div>
        </header>

        <main id="portal-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="missions-grid">
                <!-- Missions will be injected here -->
                <div class="col-span-full py-20 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    <p class="mt-4 text-slate-500">Loading missions...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function fetchMissions() {
            try {
                const response = await fetch('/missions');
                const missions = await response.json();
                renderMissions(missions);
            } catch (error) {
                console.error('Failed to fetch missions:', error);
                document.getElementById('missions-grid').innerHTML = `
                    <div class="col-span-full p-8 text-center text-red-400 card">
                        Failed to connect to Niyam API. Make sure the server is running.
                    </div>
                `;
            }
        }

        function renderMissions(missions) {
            const grid = document.getElementById('missions-grid');
            if (missions.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center text-slate-500 card">
                        No missions found in this workspace. Run <code class="text-cyan-400">niyam run</code> to start one.
                    </div>
                `;
                return;
            }

            grid.innerHTML = missions.map(m => `
                <div class="card cursor-pointer" onclick="viewMission('${m.id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-sm font-semibold text-cyan-400">${m.id}</span>
                        <span class="status-badge status-${m.status.toLowerCase()}">${m.status}</span>
                    </div>
                    <h3 class="text-lg font-bold mb-2">Orchestrator: ${m.orchestrator}</h3>
                    <div class="text-sm text-slate-400 space-y-1">
                        <p>Tasks: ${m.completed_tasks} / ${m.task_count}</p>
                        <p>Created: ${m.created}</p>
                    </div>
                    <div class="mt-4 w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-cyan-500 h-full" style="width: ${(m.completed_tasks / m.task_count) * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function viewMission(id) {
            // Placeholder for detailed view
            window.location.href = '/docs'; // For now, redirects to Swagger
        }

        // Auto-refresh every 5 seconds
        fetchMissions();
        setInterval(fetchMissions, 5000);
    </script>
</body>
</html>
