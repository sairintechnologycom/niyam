<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niyam Governance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1e293b 0%, #090d16 100%); color: #f8fafc; }
        .card { background-color: rgba(17, 24, 39, 0.7); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 0.75rem; padding: 1.5rem; transition: all 0.2s; backdrop-filter: blur(16px); }
        .card:hover { border-color: #06b6d4; transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(6, 182, 212, 0.25); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border: 1px solid transparent; }
        .status-completed { background-color: rgba(6, 95, 70, 0.5); color: #34d399; border-color: rgba(52, 211, 153, 0.2); }
        .status-running { background-color: rgba(133, 77, 14, 0.5); color: #fbbf24; border-color: rgba(251, 191, 36, 0.2); }
        .status-failed { background-color: rgba(127, 29, 29, 0.5); color: #f87171; border-color: rgba(248, 113, 113, 0.2); }
        .status-planned { background-color: rgba(30, 41, 59, 0.5); color: #94a3b8; border-color: rgba(255, 255, 255, 0.08); }
        .status-awaiting_approval { background-color: rgba(146, 64, 14, 0.5); color: #f97316; border-color: rgba(249, 115, 22, 0.25); animation: pulse 2s infinite; }
        .status-pending_approvals { background-color: rgba(133, 77, 14, 0.5); color: #fbbf24; border-color: rgba(251, 191, 36, 0.2); }
        .status-paused { background-color: rgba(71, 85, 105, 0.5); color: #cbd5e1; border-color: rgba(203, 213, 225, 0.2); }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="cursor-pointer" onclick="showMissions()">
                <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">NIYAM PORTAL</h1>
                <p class="text-slate-400 mt-2">AI Governance & Orchestration Control Plane</p>
            </div>
            <nav class="flex flex-wrap gap-2 md:gap-4">
                <button id="nav-missions" onclick="showMissions()" class="px-4 py-2 rounded font-bold text-sm bg-cyan-600 hover:bg-cyan-500 text-white transition-all shadow-lg shadow-cyan-500/20">Missions</button>
                <button id="nav-analytics" onclick="showAnalytics()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Analytics</button>
                <button id="nav-policies" onclick="showPolicies()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Policies</button>
                <button id="nav-audits" onclick="showAudits()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Audits</button>
                <button id="nav-guard" onclick="showGuard()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Guard</button>
                <button id="nav-mcp" onclick="showMcp()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">MCP</button>
                <button id="nav-swarm" onclick="showSwarm()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Swarm</button>
                <button id="nav-fleet" onclick="showFleet()" class="px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all">Fleet</button>
            </nav>
            <div id="connection-status" class="text-sm flex items-center">
                <span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span> Connected
            </div>
        </header>

        <main id="portal-content">
            <div id="missions-view">
                <div id="project-stats" class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10 hidden">
                    <!-- Stats will be injected here -->
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="missions-grid">
                    <!-- Missions will be injected here -->
                    <div class="col-span-full py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                        <p class="mt-4 text-slate-500">Loading missions...</p>
                    </div>
                </div>
            </div>

            <div id="analytics-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Fleet Analytics</h2>
                <div id="analytics-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="policies-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Team Policies</h2>
                <div id="policies-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="audits-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Prompt & Version Audits</h2>
                <div id="audits-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="guard-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Guard Action Logs</h2>
                <div id="guard-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="mcp-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">MCP Tool Registry</h2>
                <div id="mcp-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="swarm-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Swarm State</h2>
                <div id="swarm-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="fleet-view" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-cyan-400">Fleet Operations</h2>
                <div id="fleet-content">
                    <div class="py-20 text-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                    </div>
                </div>
            </div>

            <div id="details-view" class="hidden">
                <button onclick="showMissions()" class="mb-6 text-sm font-semibold flex items-center text-cyan-400 hover:text-cyan-300">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Back to Missions
                </button>
                
                <div id="mission-details-content">
                    <!-- Detailed content will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentMissionId = null;

        function getHeaders() {
            const headers = {
                'Content-Type': 'application/json'
            };
            if (window.NIYAM_AUTH_TOKEN) {
                headers['X-Niyam-Token'] = window.NIYAM_AUTH_TOKEN;
            }
            return headers;
        }

        async function fetchMissions() {
            try {
                const response = await fetch('/missions', { headers: getHeaders() });
                const missions = await response.json();
                renderStats(missions);
                renderMissions(missions);
            } catch (error) {
                console.error('Failed to fetch missions:', error);
                document.getElementById('missions-grid').innerHTML = `
                    <div class="col-span-full p-8 text-center text-red-400 card">
                        Failed to connect to Niyam API. Make sure the server is running.
                    </div>
                `;
            }
        }

        function renderStats(missions) {
            const statsContainer = document.getElementById('project-stats');
            if (!missions || missions.length === 0) {
                statsContainer.classList.add('hidden');
                return;
            }
            statsContainer.classList.remove('hidden');
            
            const total = missions.length;
            const completed = missions.filter(m => m.status === 'completed').length;
            const successRate = total > 0 ? ((completed / total) * 100).toFixed(0) : 0;
            
            const readinessMissions = missions.filter(m => m.readiness_score !== null);
            const avgReadiness = readinessMissions.length > 0
                ? (readinessMissions.reduce((acc, m) => acc + m.readiness_score, 0) / readinessMissions.length).toFixed(0)
                : 0;

            statsContainer.innerHTML = `
                <div class="card bg-slate-800/30 p-4">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Missions</p>
                    <p class="text-2xl font-bold">${total}</p>
                </div>
                <div class="card bg-slate-800/30 p-4">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Success Rate</p>
                    <p class="text-2xl font-bold text-green-400">${successRate}%</p>
                </div>
                <div class="card bg-slate-800/30 p-4">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Avg Readiness</p>
                    <p class="text-2xl font-bold text-cyan-400">${avgReadiness > 0 ? avgReadiness + '%' : 'N/A'}</p>
                </div>
                <div class="card bg-slate-800/30 p-4">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Gov Mode</p>
                    <p class="text-2xl font-bold text-blue-400 tracking-tight uppercase">Active</p>
                </div>
            `;
        }

        function hideAllViews() {
            document.getElementById('missions-view').classList.add('hidden');
            document.getElementById('analytics-view').classList.add('hidden');
            document.getElementById('policies-view').classList.add('hidden');
            document.getElementById('audits-view').classList.add('hidden');
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('guard-view').classList.add('hidden');
            document.getElementById('mcp-view').classList.add('hidden');
            document.getElementById('swarm-view').classList.add('hidden');
            document.getElementById('fleet-view').classList.add('hidden');
        }

        function setActiveNav(activeId) {
            const navIds = ['nav-missions', 'nav-analytics', 'nav-policies', 'nav-audits', 'nav-guard', 'nav-mcp', 'nav-swarm', 'nav-fleet'];
            navIds.forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    if (id === activeId) {
                        btn.className = "px-4 py-2 rounded font-bold text-sm bg-cyan-600 hover:bg-cyan-500 text-white transition-all shadow-lg shadow-cyan-500/20";
                    } else {
                        btn.className = "px-4 py-2 rounded font-bold text-sm bg-slate-800 hover:bg-slate-700 text-slate-200 transition-all";
                    }
                }
            });
        }

        function showMissions() {
            setActiveNav('nav-missions');
            hideAllViews();
            document.getElementById('missions-view').classList.remove('hidden');
            currentMissionId = null;
            fetchMissions();
        }

        async function showAnalytics() {
            setActiveNav('nav-analytics');
            document.getElementById('missions-view').classList.add('hidden');
            document.getElementById('analytics-view').classList.remove('hidden');
            document.getElementById('policies-view').classList.add('hidden');
            document.getElementById('audits-view').classList.add('hidden');
            document.getElementById('details-view').classList.add('hidden');
            
            const content = document.getElementById('analytics-content');
            try {
                const response = await fetch('/analytics');
                const a = await response.json();
                
                let agentsHtml = '';
                if (a.agent_performance) {
                    const sortedAgents = Object.entries(a.agent_performance).sort((x, y) => y[1].success_rate - x[1].success_rate);
                    
                    agentsHtml = `
                        <div class="card overflow-hidden">
                            <h3 class="text-lg font-bold mb-4">Agent Performance Ranking</h3>
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="text-xs text-slate-500 uppercase border-b border-slate-700">
                                        <th class="pb-3">Agent</th>
                                        <th class="pb-3 text-right">Tasks</th>
                                        <th class="pb-3 text-right">Success Rate</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-800">
                                    ${sortedAgents.map(([name, s]) => `
                                        <tr>
                                            <td class="py-4 font-bold text-slate-300">${name}</td>
                                            <td class="py-4 text-right text-slate-400">${s.tasks}</td>
                                            <td class="py-4 text-right">
                                                <span class="font-mono font-bold ${s.success_rate >= 90 ? 'text-green-400' : (s.success_rate >= 70 ? 'text-yellow-400' : 'text-red-400')}">
                                                    ${s.success_rate.toFixed(1)}%
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                }

                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        <div class="card border-l-4 border-cyan-500">
                            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Fleet Total Cost</p>
                            <p class="text-3xl font-bold">$${(a.total_cost_usd || 0).toFixed(4)}</p>
                        </div>
                        <div class="card border-l-4 border-green-500">
                            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Avg Success Rate</p>
                            <p class="text-3xl font-bold text-green-400">${(a.avg_success_rate || 0).toFixed(1)}%</p>
                        </div>
                        <div class="card border-l-4 border-blue-500">
                            <p class="text-xs text-slate-500 uppercase font-bold mb-1">Avg Token Efficiency</p>
                            <p class="text-3xl font-bold text-cyan-400">${(a.avg_savings_percent || 0).toFixed(1)}%</p>
                        </div>
                    </div>
                    
                    ${agentsHtml}
                `;
            } catch (error) {
                content.innerHTML = `<div class="card text-red-400">Error loading analytics: ${error}</div>`;
            }
        }

        async function showPolicies() {
            setActiveNav('nav-policies');
            document.getElementById('missions-view').classList.add('hidden');
            document.getElementById('analytics-view').classList.add('hidden');
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('audits-view').classList.add('hidden');
            document.getElementById('policies-view').classList.remove('hidden');
            
            const content = document.getElementById('policies-content');
            try {
                const response = await fetch('/policies');
                const data = await response.json();
                
                const guard = data.guard_config || {};
                const security = data.security || {};
                const commands = data.commands || {};
                const approvals = data.approvals || [];
                
                let guardHtml = `
                    <div class="space-y-3">
                        <div class="flex justify-between border-b border-slate-700/50 pb-2">
                            <span class="text-slate-400">CI Auto Approve</span>
                            <span class="font-bold ${guard.allow_ci_auto_approve ? 'text-green-400' : 'text-red-400'}">${guard.allow_ci_auto_approve ? 'Enabled' : 'Disabled'}</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-700/50 pb-2">
                            <span class="text-slate-400">Auto Heal</span>
                            <span class="font-bold ${guard.auto_heal ? 'text-green-400' : 'text-slate-400'}">${guard.auto_heal ? 'Enabled' : 'Disabled'}</span>
                        </div>
                        <div class="flex justify-between border-b border-slate-700/50 pb-2">
                            <span class="text-slate-400">Strict Verification</span>
                            <span class="font-bold ${guard.strict ? 'text-green-400' : 'text-slate-400'}">${guard.strict ? 'Enabled' : 'Disabled'}</span>
                        </div>
                    </div>
                `;
                
                let secHtml = `
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold mb-2">Allowed Validation Executables</h4>
                            <div class="flex flex-wrap gap-2">
                                ${(security.allowed_validation_executables || []).map(bin => `<code class="px-2 py-0.5 rounded bg-slate-900 text-xs text-cyan-400">${bin}</code>`).join('') || '<span class="text-slate-500 italic">None</span>'}
                            </div>
                        </div>
                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold mb-2">Protected Files / Areas</h4>
                            <div class="flex flex-wrap gap-2">
                                ${(security.protected_files || []).map(f => `<code class="px-2 py-0.5 rounded bg-slate-900 text-xs text-yellow-400">${f}</code>`).join('') || '<span class="text-slate-500 italic">None</span>'}
                            </div>
                        </div>
                    </div>
                `;
                
                let cmdHtml = `
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold mb-2 text-red-400">Denied Commands (Blocked)</h4>
                            <div class="flex flex-wrap gap-2">
                                ${(commands.denied_commands || []).map(cmd => `<code class="px-2 py-0.5 rounded bg-red-950/40 text-xs text-red-400 border border-red-900/30">${cmd}</code>`).join('') || '<span class="text-slate-500 italic">None</span>'}
                            </div>
                        </div>
                        <div>
                            <h4 class="text-xs text-slate-500 uppercase font-bold mb-2 text-yellow-400">Approval Required (Gates)</h4>
                            <div class="flex flex-wrap gap-2">
                                ${(commands.approval_required_commands || []).map(cmd => `<code class="px-2 py-0.5 rounded bg-yellow-950/40 text-xs text-yellow-400 border border-yellow-900/30">${cmd}</code>`).join('') || '<span class="text-slate-500 italic">None</span>'}
                            </div>
                        </div>
                    </div>
                `;
                
                let appHtml = `
                    <div>
                        <h4 class="text-xs text-slate-500 uppercase font-bold mb-2">Triggers Requiring Review</h4>
                        <ul class="list-disc list-inside space-y-1 text-slate-300 text-sm">
                            ${approvals.map(app => `<li>${app}</li>`).join('') || '<span class="text-slate-500 italic">None configured</span>'}
                        </ul>
                    </div>
                `;
                
                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="card">
                            <h3 class="text-lg font-bold mb-4 text-cyan-400 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                                Guard Configuration
                            </h3>
                            ${guardHtml}
                        </div>
                        <div class="card">
                            <h3 class="text-lg font-bold mb-4 text-cyan-400 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                Security Isolation Policy
                            </h3>
                            ${secHtml}
                        </div>
                        <div class="card">
                            <h3 class="text-lg font-bold mb-4 text-cyan-400 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                Command Guardrails
                            </h3>
                            ${cmdHtml}
                        </div>
                        <div class="card">
                            <h3 class="text-lg font-bold mb-4 text-cyan-400 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                                Approval Gates Policy
                            </h3>
                            ${appHtml}
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<div class="card text-red-400">Error loading policies: ${error}</div>`;
            }
        }
        
        async function showAudits() {
            setActiveNav('nav-audits');
            hideAllViews();
            document.getElementById('audits-view').classList.remove('hidden');
            
            const content = document.getElementById('audits-content');
            try {
                const response = await fetch('/audits/prompts');
                const data = await response.json();
                
                if (data.length === 0) {
                    content.innerHTML = '<div class="card text-slate-500 text-center py-10">No prompts found in audits.</div>';
                    return;
                }

                content.innerHTML = `
                    <div class="space-y-6">
                        ${data.map(p => `
                            <div class="card">
                                <div class="flex justify-between items-start mb-4">
                                    <h3 class="font-bold text-cyan-400">Mission: ${p.mission_id} | Task: ${p.task_id}</h3>
                                    <span class="text-xs text-slate-500">${new Date(p.timestamp * 1000).toLocaleString()}</span>
                                </div>
                                <div class="bg-slate-900 p-4 rounded text-sm font-mono text-slate-300 max-h-96 overflow-y-auto whitespace-pre-wrap">
                                    ${p.content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<div class="card text-red-400">Error loading audits: ${error}</div>`;
            }
        }

        async function approveMission(missionId, role) {
            try {
                const response = await fetch(`/missions/${missionId}/approve?role=${role}`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.success) {
                    alert(result.message);
                    viewMission(missionId);
                } else {
                    alert('Approval failed: ' + result.message);
                }
            } catch (error) {
                alert('Error approving mission: ' + error);
            }
        }

        async function approveTask(missionId, taskId) {
            if (!confirm(`Are you sure you want to approve task ${taskId}?`)) return;
            try {
                const response = await fetch(`/missions/${missionId}/tasks/${taskId}/approve`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                const result = await response.json();
                if (result.success) {
                    alert(result.message);
                    viewMission(missionId);
                } else {
                    alert('Approval failed: ' + result.message);
                }
            } catch (error) {
                alert('Error approving task: ' + error);
            }
        }

        async function denyTask(missionId, taskId) {
            if (!confirm(`Are you sure you want to reject/deny task ${taskId}?`)) return;
            try {
                const response = await fetch(`/missions/${missionId}/tasks/${taskId}/deny`, {
                    method: 'POST'
                });
                const result = await response.json();
                if (result.success) {
                    alert(result.message);
                    viewMission(missionId);
                } else {
                    alert('Rejection failed: ' + result.message);
                }
            } catch (error) {
                alert('Error rejecting task: ' + error);
            }
        }

        async function viewMission(id) {
            currentMissionId = id;
            setActiveNav('');
            hideAllViews();
            document.getElementById('details-view').classList.remove('hidden');

            const content = document.getElementById('mission-details-content');
            content.innerHTML = `
                <div class="py-20 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mx-auto"></div>
                </div>
            `;

            try {
                const response = await fetch(`/missions/${id}`, { headers: getHeaders() });
                const m = await response.json();
                
                let metricsHtml = '';
                if (m.metrics) {
                    metricsHtml = `
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
                            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1">Tokens Used</p>
                                <p class="text-xl font-mono">${m.metrics.actual_tokens.toLocaleString()}</p>
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1">Actual Cost</p>
                                <p class="text-xl font-mono">$${m.metrics.actual_cost_usd.toFixed(4)}</p>
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1 text-red-400">Wasted</p>
                                <p class="text-xl font-mono text-red-400">$${m.metrics.wasted_cost_usd.toFixed(4)}</p>
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1">Savings</p>
                                <p class="text-xl font-mono text-green-400">$${m.metrics.savings_cost_usd.toFixed(4)}</p>
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                                <p class="text-xs text-slate-500 uppercase font-bold mb-1">Efficiency</p>
                                <p class="text-xl font-mono text-cyan-400">${m.metrics.savings_percent.toFixed(1)}%</p>
                            </div>
                        </div>
                    `;
                }

                let approvalsHtml = '';
                if (m.approvals && m.approvals.required_roles) {
                    const reqRoles = m.approvals.required_roles;
                    const curApprovals = m.approvals.current_approvals;
                    
                    let rolesList = reqRoles.map(role => {
                        const approvedByRole = curApprovals[role];
                        const icon = approvedByRole ? '✅ Approved' : '⏳ Pending';
                        const badgeStyle = approvedByRole ? 'text-green-400' : 'text-yellow-400';
                        const timestamp = approvedByRole ? `<span class="text-xs text-slate-500 ml-2">(${new Date(approvedByRole.timestamp).toLocaleString()})</span>` : '';
                        
                        let approveBtn = '';
                        if (!approvedByRole && m.status !== 'completed' && m.status !== 'failed' && m.status !== 'cancelled') {
                            approveBtn = `<button onclick="approveMission('${m.id}', '${role}')" class="px-2 py-1 ml-4 rounded bg-cyan-600 hover:bg-cyan-500 text-xs font-bold text-white transition-colors">Approve as ${role}</button>`;
                        }
                        
                        return `
                            <div class="flex justify-between items-center py-2 border-b border-slate-700/50">
                                <div class="flex items-center">
                                    <span class="font-semibold text-slate-300 mr-2">${role}:</span>
                                    <span class="text-sm ${badgeStyle}">${icon}</span>
                                    ${timestamp}
                                </div>
                                ${approveBtn}
                            </div>
                        `;
                    }).join('');
                    
                    approvalsHtml = `
                        <div class="card mb-8">
                            <h3 class="text-lg font-bold mb-4 text-cyan-400 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                Enterprise Approval Gates
                            </h3>
                            <div class="space-y-2">
                                ${rolesList}
                            </div>
                        </div>
                    `;
                }

                content.innerHTML = `
                    <div class="flex flex-col lg:flex-row gap-8">
                        <div class="lg:w-2/3">
                            <div class="card mb-8">
                                <div class="flex justify-between items-center mb-6">
                                    <h2 class="text-2xl font-bold">Mission: ${m.id}</h2>
                                    <span class="status-badge status-${m.status.toLowerCase()}">${m.status.replace('_', ' ')}</span>
                                </div>
                                
                                ${metricsHtml}
                                ${approvalsHtml}

                                <h3 class="text-lg font-bold mb-4">Task Pipeline</h3>
                                <div class="space-y-4">
                                    ${m.tasks.map(t => {
                                        let approvalButtons = '';
                                        if (t.status === 'awaiting_approval') {
                                            approvalButtons = `
                                                <button onclick="approveTask('${m.id}', '${t.id}')" class="px-2 py-1 rounded bg-green-600 hover:bg-green-500 text-[10px] font-bold text-white transition-colors">APPROVE</button>
                                                <button onclick="denyTask('${m.id}', '${t.id}')" class="px-2 py-1 rounded bg-red-600 hover:bg-red-500 text-[10px] font-bold text-white transition-colors">REJECT</button>
                                            `;
                                        }
                                        return `
                                            <div class="p-4 bg-slate-800/30 rounded-lg border border-slate-700 flex justify-between items-center group">
                                                <div>
                                                    <p class="font-bold text-slate-200">${t.id}: ${t.title}</p>
                                                    <p class="text-xs text-slate-500 mt-1">Agent: ${t.agent} • ${t.duration.toFixed(1)}s</p>
                                                </div>
                                                <div class="flex items-center gap-3">
                                                    ${approvalButtons}
                                                    <button onclick="viewLogs('${m.id}', '${t.id}')" class="opacity-0 group-hover:opacity-100 text-[10px] font-bold text-cyan-500 hover:text-cyan-400 transition-opacity">VIEW LOGS</button>
                                                    <span class="text-xs font-mono status-badge status-${t.status.toLowerCase()}">${t.status.replace('_', ' ')}</span>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        </div>

                        <div class="lg:w-1/3">
                            <div class="card bg-slate-900/50">
                                <h3 class="text-lg font-bold mb-4">Governance Verdict</h3>
                                ${m.readiness_score !== null ? `
                                    <div class="mb-6">
                                        <div class="flex justify-between items-center mb-2">
                                            <span class="text-sm text-slate-400">Readiness Score</span>
                                            <span class="text-2xl font-bold ${m.readiness_score >= 90 ? 'text-green-400' : (m.readiness_score >= 75 ? 'text-yellow-400' : 'text-red-400')}">${m.readiness_score}/100</span>
                                        </div>
                                        <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                                            <div class="h-full ${m.readiness_score >= 90 ? 'bg-green-500' : (m.readiness_score >= 75 ? 'bg-yellow-500' : 'bg-red-500')}" style="width: ${m.readiness_score}%"></div>
                                        </div>
                                        <div class="mt-4 p-3 bg-slate-800 rounded border border-slate-700 text-center">
                                            <p class="text-xs text-slate-500 uppercase tracking-tighter mb-1">Decision</p>
                                            <p class="text-xl font-black ${m.decision === 'GO' ? 'text-green-400' : (m.decision === 'CONDITIONAL_GO' ? 'text-yellow-400' : 'text-red-400')}">
                                                ${m.decision ? m.decision.replace('_', ' ') : 'PENDING'}
                                            </p>
                                        </div>
                                    </div>
                                ` : `
                                    <div class="py-8 text-center text-slate-500 italic">
                                        No scan evidence compiled for this mission yet.
                                    </div>
                                `}
                                
                                <div class="space-y-3 mt-8">
                                    <button onclick="downloadSarif('${m.id}')" class="w-full py-2 bg-slate-700 hover:bg-slate-600 rounded font-bold text-sm">DOWNLOAD SARIF</button>
                                    <button onclick="viewEvidence('${m.id}')" class="w-full py-2 bg-cyan-600 hover:bg-cyan-500 rounded font-bold text-sm">VIEW FULL EVIDENCE</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<div class="card text-red-400">Error loading details: ${error}</div>`;
            }
        }

        async function viewLogs(missionId, taskId) {
            try {
                const response = await fetch(`/missions/${missionId}/tasks/${taskId}/logs`);
                const data = await response.json();
                showModal(`Task Logs: ${taskId}`, data.content);
            } catch (error) {
                alert('Error loading logs: ' + error);
            }
        }

        function downloadSarif(id) {
            window.open(`/missions/${id}/sarif`, '_blank');
        }

        function showModal(title, content) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center p-8 z-50';
            modal.innerHTML = `
                <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-4xl max-h-full overflow-hidden flex flex-col shadow-2xl">
                    <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                        <h3 class="font-bold uppercase tracking-widest text-cyan-400">${title}</h3>
                        <button onclick="this.closest('.fixed').remove()" class="text-slate-400 hover:text-white p-1 rounded-full hover:bg-slate-700">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                    <div class="p-8 overflow-y-auto font-mono text-sm whitespace-pre-wrap text-slate-300 bg-slate-950/50">
                        ${content}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function viewEvidence(id) {
             try {
                const response = await fetch(`/missions/${id}/evidence`, { headers: getHeaders() });
                if (!response.ok) throw new Error('Evidence not found');
                const data = await response.json();
                showModal(`Evidence Report: ${id}`, data.content);
            } catch (error) {
                alert('Error loading evidence: ' + error);
            }
        }

        function renderMissions(missions) {
            const grid = document.getElementById('missions-grid');
            if (missions.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center text-slate-500 card">
                        No missions found in this workspace. Run <code class="text-cyan-400">niyam run</code> to start one.
                    </div>
                `;
                return;
            }

            grid.innerHTML = missions.map(m => `
                <div class="card flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-sm font-semibold text-cyan-400">${m.id}</span>
                            <span class="status-badge status-${m.status.toLowerCase()}">${m.status}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2">Orchestrator: ${m.orchestrator}</h3>
                        <div class="text-sm text-slate-400 space-y-1 mb-4">
                            <p>Tasks: ${m.completed_tasks} / ${m.task_count}</p>
                            <p>Created: ${m.created}</p>
                            ${m.readiness_score !== null ? `
                            <div class="mt-4 pt-4 border-t border-slate-700">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Readiness Score</span>
                                    <span class="font-bold ${m.readiness_score >= 90 ? 'text-green-400' : (m.readiness_score >= 75 ? 'text-yellow-400' : 'text-red-400')}">${m.readiness_score}/100</span>
                                </div>
                                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                    <div class="h-full ${m.readiness_score >= 90 ? 'bg-green-500' : (m.readiness_score >= 75 ? 'bg-yellow-500' : 'bg-red-500')}" style="width: ${m.readiness_score}%"></div>
                                </div>
                                ${m.decision ? `
                                <div class="mt-2 text-center">
                                    <span class="text-[10px] px-2 py-0.5 rounded font-bold bg-slate-800 ${m.decision === 'GO' ? 'text-green-400 border border-green-900' : (m.decision === 'CONDITIONAL_GO' ? 'text-yellow-400 border border-yellow-900' : 'text-red-400 border border-red-900')}">
                                        ${m.decision.replace('_', ' ')}
                                    </span>
                                </div>
                                ` : ''}
                            </div>
                            ` : ''}
                        </div>
                    </div>
                    <div>
                        <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden mb-6">
                            <div class="bg-cyan-500 h-full transition-all duration-500" style="width: ${(m.completed_tasks / m.task_count) * 100}%"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="performAction('${m.id}', 'replan')" class="text-xs font-semibold py-2 px-3 rounded bg-slate-700 hover:bg-slate-600 text-white transition-colors">
                                RE-PLAN
                            </button>
                            <button onclick="viewMission('${m.id}')" class="text-xs font-semibold py-2 px-3 rounded bg-cyan-600 hover:bg-cyan-500 text-white transition-colors">
                                DETAILS
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function performAction(missionId, action) {
            if (!confirm(`Are you sure you want to ${action} mission ${missionId}?`)) return;
            
            try {
                const response = await fetch(`/missions/${missionId}/action?action=${action}`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                const result = await response.json();
                if (result.success) {
                    alert(result.message);
                    fetchMissions();
                } else {
                    alert('Action failed: ' + result.message);
                }
            } catch (error) {
                alert('Error performing action: ' + error);
            }
        }

        // Auto-refresh every 5 seconds
        fetchMissions();
        setInterval(fetchMissions, 5000);
    </script>
</body>
</html>
</body>
</html>
