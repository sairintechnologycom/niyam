[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sutra-cli"
version = "0.1.0"
description = "Governed AI-development workspaces for Claude Code, Codex CLI, and future coding runtimes."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Sutra Team" },
]
keywords = ["ai", "cli", "claude", "codex", "governance", "agents"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Build Tools",
]
dependencies = [
    "typer>=0.15.0,<1.0",
    "rich>=13.0.0,<14.0",
    "pydantic>=2.0.0,<3.0",
    "pyyaml>=6.0,<7.0",
    "jinja2>=3.1.0,<4.0",
    "gitpython>=3.1.0,<4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "pytest-tmp-files>=0.0.2",
]

[project.scripts]
sutra = "sutra.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["sutra"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
